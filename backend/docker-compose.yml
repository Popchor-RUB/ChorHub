services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env.db
    volumes:
      - ../pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  backend:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file:
      - ../.env.backend
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

networks:
  app:
