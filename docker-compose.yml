include:
  - backend/docker-compose.yml

services:
  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks:
      - app

networks:
  app:
